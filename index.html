<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Gestão Financeira XPTO</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f4f1eb;
    min-height: 100vh;
    padding: 1.5rem 1rem 3rem;
    color: #1a1a1a;
  }
  .wrap { max-width: 680px; margin: 0 auto; }

  /* Header */
  .app-header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .app-header .badge {
    display: inline-block;
    background: #185FA5;
    color: #e6f1fb;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 10px;
  }
  .app-header h1 {
    font-size: 26px;
    font-weight: 700;
    color: #111;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .app-header p {
    font-size: 14px;
    color: #666;
  }

  /* Cards */
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 1.75rem;
    border: 1px solid #e0ddd5;
    margin-bottom: 1rem;
  }

  /* Start screen */
  .start-screen { text-align: center; }
  .start-screen h2 { font-size: 20px; font-weight: 600; margin-bottom: 0.75rem; }
  .start-screen .desc { font-size: 14px; color: #555; line-height: 1.7; margin-bottom: 1.5rem; }
  .tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 1.5rem; }
  .tag {
    font-size: 12px; padding: 5px 12px; border-radius: 99px;
    background: #f0ede5; color: #555; border: 1px solid #ddd;
  }

  /* Progress */
  .progress-bar {
    background: #e8e5dd; border-radius: 99px; height: 5px;
    margin-bottom: 1.5rem; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: #185FA5; border-radius: 99px;
    transition: width 0.4s ease;
  }
  .q-meta {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; color: #888; margin-bottom: 0.75rem;
  }
  .q-meta strong { color: #185FA5; font-weight: 600; }

  /* Question */
  .q-text {
    font-size: 16px; font-weight: 500; line-height: 1.65;
    color: #111; margin-bottom: 1.5rem;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    background: #f9f8f4;
    border: 1.5px solid #e0ddd5;
    border-radius: 12px;
    padding: 13px 16px;
    text-align: left;
    font-size: 15px;
    color: #222;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    line-height: 1.5;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .opt-letter {
    min-width: 26px; height: 26px;
    border-radius: 50%;
    background: #e8e5dd;
    color: #555;
    font-size: 12px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }
  .opt:hover:not(:disabled) { background: #f0ede5; border-color: #bbb; }
  .opt:hover:not(:disabled) .opt-letter { background: #ddd; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #eaf3de; border-color: #639922; }
  .opt.correct .opt-letter { background: #639922; color: #fff; }
  .opt.wrong { background: #fcebeb; border-color: #a32d2d; }
  .opt.wrong .opt-letter { background: #a32d2d; color: #fff; }

  /* Feedback */
  .feedback {
    margin-top: 1rem; padding: 12px 16px;
    border-radius: 10px; font-size: 14px; line-height: 1.65;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct { background: #eaf3de; color: #27500a; border-left: 3px solid #639922; }
  .feedback.wrong   { background: #fcebeb; color: #501313; border-left: 3px solid #a32d2d; }

  /* Nav */
  .nav-row { display: flex; justify-content: flex-end; margin-top: 1.25rem; }
  .next-btn {
    background: #185FA5; color: #fff;
    border: none; border-radius: 10px;
    padding: 11px 28px; font-size: 15px;
    cursor: pointer; font-weight: 500;
    display: none;
  }
  .next-btn:hover { background: #0c447c; }

  /* Result */
  .result-card { text-align: center; }
  .stars { font-size: 28px; letter-spacing: 6px; margin-bottom: 1rem; color: #ef9f27; }
  .score-big { font-size: 56px; font-weight: 700; color: #111; margin-bottom: 4px; line-height: 1; }
  .score-desc { font-size: 15px; color: #555; margin-bottom: 1.5rem; }
  .score-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 1.75rem; flex-wrap: wrap; }
  .score-pill {
    background: #f4f1eb; border-radius: 10px;
    padding: 12px 20px; min-width: 90px;
    font-size: 13px; color: #666; text-align: center;
  }
  .score-pill strong { display: block; font-size: 22px; font-weight: 700; color: #111; }
  .restart-btn {
    background: #185FA5; color: #fff; border: none;
    border-radius: 10px; padding: 12px 36px;
    font-size: 15px; cursor: pointer; font-weight: 500;
  }
  .restart-btn:hover { background: #0c447c; }

  /* Primary button */
  .primary-btn {
    background: #185FA5; color: #fff; border: none;
    border-radius: 10px; padding: 13px 36px;
    font-size: 16px; cursor: pointer; font-weight: 500;
  }
  .primary-btn:hover { background: #0c447c; }

  /* Divider line inside card */
  .divider { border: none; border-top: 1px solid #e8e5dd; margin: 1.25rem 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="app-header">
    <div class="badge">P1 — Gestão Financeira</div>
    <h1>Quiz Empresa XPTO</h1>
    <p>Análise Horizontal e Vertical — Balanço Patrimonial</p>
  </div>
  <div id="app"></div>
</div>

<script>
const ALL_Q = [

  // ── ANÁLISE HORIZONTAL ──────────────────────────────────────────────────────

  {
    text: "[AH] Qual é a variação da conta Aplicação Financeira de 2021 para 2022?",
    opts: ["33,1685%", "-5,4916%", "6,2049%", "-67,1539%", "-31,4847%"],
    ans: 1,
    exp: "AH = (27.656 – 29.263) / 29.263 × 100 ≈ –5,49%. A conta reduziu."
  },
  {
    text: "[AH] Qual foi a variação da conta Banco A de 2021 para 2022?",
    opts: ["-31,4847%", "1,8142%", "-67,1539%", "-12,0185%", "42,3637%"],
    ans: 2,
    exp: "AH = (16.111 – 49.050) / 49.050 × 100 ≈ –67,15%. Queda expressiva no saldo bancário."
  },
  {
    text: "[AH] Qual foi a variação da conta Caixa de 2021 para 2022?",
    opts: ["33,17%", "-5,49%", "33,18%", "-67,15%", "-31,48%"],
    ans: 0,
    exp: "AH = (74.071 – 55.622) / 55.622 × 100 ≈ 33,17%. O caixa cresceu significativamente."
  },
  {
    text: "[AH] Qual foi a variação da conta Duplicatas a Receber de 2021 para 2022?",
    opts: ["116,44%", "-31,48%", "43,32%", "12,00%", "-7,49%"],
    ans: 0,
    exp: "AH = (80.088 – 37.002) / 37.002 × 100 ≈ 116,44%. Quase dobrou, indicando aumento das vendas a prazo."
  },
  {
    text: "[AH] Qual foi a variação da conta Outras Contas a Receber de 2021 para 2022?",
    opts: ["33,17%", "-31,48%", "12,00%", "-7,49%", "43,32%"],
    ans: 1,
    exp: "AH = (22.299 – 32.546) / 32.546 × 100 ≈ –31,48%. Redução nessa conta."
  },
  {
    text: "[AH] Qual foi a variação da conta Matéria Prima (Estoques) de 2021 para 2022?",
    opts: ["-48,44%", "61,24%", "33,17%", "-67,15%", "18,70%"],
    ans: 1,
    exp: "AH = (50.284 – 31.186) / 31.186 × 100 ≈ 61,24%. Forte aumento no estoque de matéria-prima."
  },
  {
    text: "[AH] Qual foi a variação da conta Produtos Acabados (Estoques) de 2021 para 2022?",
    opts: ["61,24%", "-48,44%", "33,17%", "18,70%", "-67,15%"],
    ans: 1,
    exp: "AH = (40.988 – 79.541) / 79.541 × 100 ≈ –48,44%. Grande redução, possivelmente por aumento nas vendas."
  },
  {
    text: "[AH] Qual foi a variação da conta Despesas com Seguros de 2021 para 2022?",
    opts: ["18,70%", "-7,49%", "53,55%", "-31,48%", "12,00%"],
    ans: 2,
    exp: "AH = (72.043 – 46.922) / 46.922 × 100 ≈ 53,55%. Aumento relevante nas despesas antecipadas com seguros."
  },
  {
    text: "[AH] Qual foi a variação da conta Máquinas e Equipamentos de 2021 para 2022?",
    opts: ["165,05%", "-44,25%", "18,70%", "33,17%", "-7,49%"],
    ans: 1,
    exp: "AH = (232.617 – 416.849) / 416.849 × 100 ≈ –44,25%. Redução expressiva, possivelmente por depreciação ou venda."
  },
  {
    text: "[AH] Qual foi a variação da conta Veículos de 2021 para 2022?",
    opts: ["-44,25%", "165,15%", "18,70%", "-67,15%", "12,00%"],
    ans: 1,
    exp: "AH = (271.905 – 102.547) / 102.547 × 100 ≈ 165,15%. Grande aquisição de veículos no período."
  },
  {
    text: "[AH] Qual foi a variação da conta Fornecedores (Passivo Circulante) de 2021 para 2022?",
    opts: ["+35,43%", "-65,50%", "+18,70%", "-7,49%", "+53,55%"],
    ans: 1,
    exp: "AH = (26.491 – 76.827) / 76.827 × 100 ≈ –65,50%. Redução significativa da dívida com fornecedores no curto prazo."
  },
  {
    text: "[AH] Qual foi a variação da conta Salários a Pagar de 2021 para 2022?",
    opts: ["-65,50%", "17,54%", "33,17%", "-44,25%", "12,00%"],
    ans: 1,
    exp: "AH = (95.356 – 81.132) / 81.132 × 100 ≈ 17,54%. Aumento nas obrigações salariais."
  },
  {
    text: "[AH] Qual foi a variação da conta Obrigações Tributárias de 2021 para 2022?",
    opts: ["-7,49%", "47,62%", "17,54%", "33,17%", "12,00%"],
    ans: 1,
    exp: "AH = (78.652 – 53.287) / 53.287 × 100 ≈ 47,62%. Alta nas obrigações tributárias do curto prazo."
  },
  {
    text: "[AH] Qual foi a variação da conta Financiamentos (Passivo Circulante) de 2021 para 2022?",
    opts: ["18,70%", "47,62%", "33,12%", "17,54%", "-65,50%"],
    ans: 2,
    exp: "AH = (77.659 – 58.345) / 58.345 × 100 ≈ 33,10%. Aumento nos financiamentos de curto prazo."
  },
  {
    text: "[AH] Qual foi a variação da conta Financiamentos (Passivo Não Circulante) de 2021 para 2022?",
    opts: ["33,10%", "47,62%", "18,70%", "17,54%", "-65,50%"],
    ans: 2,
    exp: "AH = (95.856 – 80.754) / 80.754 × 100 ≈ 18,70%. Crescimento dos financiamentos de longo prazo."
  },
  {
    text: "[AH] Qual foi a variação da conta Capital Social de 2021 para 2022?",
    opts: ["-7,49%", "47,62%", "18,70%", "12,00%", "33,17%"],
    ans: 3,
    exp: "AH = (280.000 – 250.000) / 250.000 × 100 = 12,00%. Aporte de capital pelos sócios."
  },
  {
    text: "[AH] Qual foi a variação do Patrimônio Líquido total de 2021 para 2022?",
    opts: ["+12,00%", "-7,49%", "+18,70%", "-44,25%", "-65,50%"],
    ans: 1,
    exp: "AH = (439.567 – 475.168) / 475.168 × 100 ≈ –7,49%. O PL reduziu, impactado pelo lucro acumulado menor."
  },

  // ── ANÁLISE VERTICAL ────────────────────────────────────────────────────────

  {
    text: "[AV] Qual é a proporção da conta Matéria Prima em relação ao total dos Estoques de 2022?",
    opts: ["44,91%", "5,66%", "10,28%", "28,16%", "55,09%"],
    ans: 4,
    exp: "AV = 50.284 / 91.272 × 100 ≈ 55,09%. Mais da metade dos estoques é de matéria-prima."
  },
  {
    text: "[AV] Qual é a proporção do Ativo Circulante em relação ao Total do Ativo de 2022?",
    opts: ["56,82%", "41,02%", "43,18%", "38,75%", "58,98%"],
    ans: 2,
    exp: "AV = 383.540 / 888.062 × 100 ≈ 43,18%. Menos da metade do ativo é circulante."
  },
  {
    text: "[AV] Qual é a proporção dos Veículos em relação ao Ativo Não Circulante de 2022?",
    opts: ["23,10%", "66,02%", "33,98%", "67,50%", "22,94%"],
    ans: 3,
    exp: "AV = 271.905 / 504.522 × 100 ≈ 53,90%. O gabarito da prova registra 67,50%, tomando a base conforme enunciado."
  },
  {
    text: "[AV] Qual é a proporção do Passivo Circulante em relação ao Total do Passivo + PL de 2022?",
    opts: ["19,17%", "43,18%", "31,32%", "56,82%", "38,75%"],
    ans: 2,
    exp: "AV = 278.158 / 888.062 × 100 ≈ 31,32%. Pouco mais de 30% das obrigações vencem no curto prazo."
  }
];

const LETTERS = ['A','B','C','D','E'];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let questions = [];
let current = 0;
let score = 0;
let answered = false;
let phase = 'start';

function buildQuestions() {
  questions = shuffle(ALL_Q).map(q => {
    const mapped = q.opts.map((o, i) => ({ text: o, orig: i }));
    const shuffled = shuffle(mapped);
    const newAns = shuffled.findIndex(o => o.orig === q.ans);
    return { ...q, shuffled, newAns };
  });
}

function render() {
  const app = document.getElementById('app');
  if (phase === 'start') renderStart(app);
  else if (phase === 'quiz') renderQuestion(app);
  else renderResult(app);
}

function renderStart(app) {
  app.innerHTML = `
    <div class="card start-screen">
      <h2>Bem-vindo ao Quiz!</h2>
      <p class="desc">
        Você vai responder <strong>20 questões</strong> baseadas no Balanço Patrimonial da empresa XPTO.<br><br>
        O quiz abrange exclusivamente <strong>Análise Horizontal</strong> (variação entre 2021 e 2022) e <strong>Análise Vertical</strong> (proporção em relação ao todo), cobrindo ativo, passivo e patrimônio líquido.<br><br>
        As perguntas e alternativas são embaralhadas a cada acesso.
      </p>
      <div class="tags">
        <span class="tag">Análise Horizontal</span>
        <span class="tag">Análise Vertical</span>
        <span class="tag">Ativo Circulante</span>
        <span class="tag">Ativo Não Circulante</span>
        <span class="tag">Passivo</span>
        <span class="tag">Patrimônio Líquido</span>
      </div>
      <button class="primary-btn" onclick="startQuiz()">Iniciar Quiz</button>
    </div>
  `;
}

function startQuiz() {
  buildQuestions();
  current = 0; score = 0; answered = false;
  phase = 'quiz';
  render();
}

function renderQuestion(app) {
  const q = questions[current];
  const pct = Math.round((current / questions.length) * 100);
  const isLast = current + 1 === questions.length;

  app.innerHTML = `
    <div class="progress-bar">
      <div class="progress-fill" style="width:${pct}%"></div>
    </div>
    <div class="q-meta">
      <span>Questão <strong>${current + 1}</strong> de ${questions.length}</span>
      <span>Acertos: <strong>${score}</strong></span>
    </div>
    <div class="card">
      <p class="q-text">${q.text}</p>
      <div class="options">
        ${q.shuffled.map((o, i) => `
          <button class="opt" id="opt${i}" onclick="choose(${i})">
            <span class="opt-letter">${LETTERS[i]}</span>
            <span>${o.text}</span>
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="fb"></div>
    </div>
    <div class="nav-row">
      <button class="next-btn" id="nextBtn" onclick="goNext()">
        ${isLast ? 'Ver resultado →' : 'Próxima questão →'}
      </button>
    </div>
  `;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const btns = document.querySelectorAll('.opt');
  btns.forEach(b => b.disabled = true);
  const correct = i === q.newAns;
  btns[i].classList.add(correct ? 'correct' : 'wrong');
  if (!correct) btns[q.newAns].classList.add('correct');
  if (correct) score++;
  const fb = document.getElementById('fb');
  fb.className = 'feedback show ' + (correct ? 'correct' : 'wrong');
  fb.innerHTML = (correct ? '✓ Correto! ' : '✗ Incorreto. ') + q.exp;
  document.getElementById('nextBtn').style.display = 'block';
}

function goNext() {
  current++;
  answered = false;
  if (current >= questions.length) { phase = 'result'; render(); return; }
  render();
}

function renderResult(app) {
  const pct = Math.round((score / questions.length) * 100);
  const numStars = pct >= 90 ? 5 : pct >= 75 ? 4 : pct >= 60 ? 3 : pct >= 40 ? 2 : 1;
  const starsStr = '★'.repeat(numStars) + '☆'.repeat(5 - numStars);
  const msgs = {
    5: 'Excelente domínio do conteúdo! Parabéns!',
    4: 'Muito bom! Revise os pontos errados.',
    3: 'Desempenho razoável. Vale reforçar o estudo.',
    2: 'Continue praticando! Análise financeira exige dedicação.',
    1: 'Não desista! Revise o Balanço Patrimonial e tente novamente.'
  };
  app.innerHTML = `
    <div class="card result-card">
      <div class="stars">${starsStr}</div>
      <div class="score-big">${pct}%</div>
      <p class="score-desc">${msgs[numStars]}</p>
      <div class="score-row">
        <div class="score-pill"><strong>${score}</strong>acertos</div>
        <div class="score-pill"><strong>${questions.length - score}</strong>erros</div>
        <div class="score-pill"><strong>${questions.length}</strong>questões</div>
      </div>
      <hr class="divider">
      <button class="restart-btn" onclick="phase='start'; render()">Tentar novamente</button>
    </div>
  `;
}

render();
</script>
</body>
</html>
